  function showFBBanner(msg, color) {
    var b = document.getElementById('_fb_banner_');
    if (!b) {
      b = document.createElement('div');
      b.id = '_fb_banner_';
      b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;padding:8px 16px;font-size:12px;font-weight:700;text-align:center;transition:all .4s;';

    }
    b.style.background = color || '#1e3a8a';
    b.style.color = '#fff';
    b.textContent = msg;
  }

  function hideFBBanner() {
    var b = document.getElementById('_fb_banner_');
    if (b) { b.style.opacity = '0'; setTimeout(function(){ if(b.parentNode) b.parentNode.removeChild(b); }, 600); }
  }

  function tryInit(attempts) {
    if (typeof firebase === 'undefined' || typeof firebase.database === 'undefined') {
      if (attempts > 0) {
        // Show connecting status on first attempt
        if (attempts === 60) showFBBanner('🔄 Connecting to Firebase (Live Sync)…', '#1e3a8a');
        setTimeout(function() { tryInit(attempts - 1); }, 300);
      } else {
        // Firebase SDK truly failed to load (offline / CDN blocked)
        showFBBanner('⚡ Offline Mode — Data saved locally in browser. Go online for Live Sync.', '#92400e');

        window._DB = null;
        window._firebaseReady = true;
        document.dispatchEvent(new Event('firebase-ready'));
      }
      return;
    }
    try {
      if (!firebase.apps.length) firebase.initializeApp(cfg);
      window._DB = firebase.database();
      if (typeof firebase.storage !== 'undefined') {
        window._STORAGE = firebase.storage();
      }
      showFBBanner('✅ Firebase Live Sync Connected!', '#065f46');
      setTimeout(hideFBBanner, 2500);
      console.log("✅ Firebase ready — Live Sync active");
    } catch(e) {
      console.error("❌ Firebase init error:", e);
      showFBBanner('⚠️ Firebase error — running in offline mode: ' + e.message, '#7f1d1d');
      setTimeout(hideFBBanner, 5000);
      window._DB = null;
      window._STORAGE = null;
    }
    window._firebaseReady = true;
    document.dispatchEvent(new Event('firebase-ready'));
  }

  // Retry up to 60 times × 300ms = 18 seconds (handles slow CDN loads)
  tryInit(60);
})();

/* ── Firebase hook ─────────────────────────────────────── */
function useFirebaseList(path,lsKey){
  const [rows,setRows]=useState(()=>{try{return JSON.parse(localStorage.getItem(lsKey)||'[]');}catch{return [];}});
  const [online,setOnline]=useState(null);

  useEffect(()=>{
    let cRef,dRef,detached=false;

    function attach(){
      if(detached)return;
      const db=window._DB;
      if(!db){setOnline(false);return;}
      cRef=db.ref('.info/connected');
      cRef.on('value',s=>setOnline(s.val()===true));
      dRef=db.ref(path);
      dRef.on('value',s=>{
        const v=s.val();const a=v?Object.values(v):[];
        setRows(a);try{localStorage.setItem(lsKey,JSON.stringify(a));}catch{}
      },()=>setOnline(false));
    }

    if(window._firebaseReady){
      attach();
    } else {
      document.addEventListener('firebase-ready',attach,{once:true});
    }

    return()=>{
      detached=true;
      document.removeEventListener('firebase-ready',attach);
      try{if(cRef)cRef.off();}catch{}
      try{if(dRef)dRef.off();}catch{}
    };
  },[path,lsKey]);

  const push=useCallback(item=>{
    const db=window._DB;
    if(db){db.ref(path).child(String(item.id)).set(item).catch(e=>console.error(e));}
    else{setRows(p=>{const n=[...p,item];try{localStorage.setItem(lsKey,JSON.stringify(n));}catch{}return n;});}
  },[path,lsKey]);

  // Soft-delete: move to trash path before removing
  const deleteOne=useCallback((id,trashPath)=>{
    const db=window._DB;
    const item=null;
    if(db){
      // Move to trash first, then delete original
      const srcRef=db.ref(path).child(String(id));
      srcRef.once('value').then(snap=>{
        const data=snap.val();
        if(data&&trashPath){
          db.ref(trashPath).child(String(id)).set({...data,deletedAt:new Date().toLocaleString('en-IN'),originalPath:path}).catch(e=>console.error(e));
        }
        srcRef.remove().catch(e=>console.error(e));
      });
    } else {
      setRows(p=>{const n=p.filter(r=>r.id!==id);try{localStorage.setItem(lsKey,JSON.stringify(n));}catch{}return n;});
    }
  },[path,lsKey]);

  // Clear ALL records in this path
  const clearAll=useCallback((trashPath)=>{
    const db=window._DB;
    if(db){
      if(trashPath){
        // Move all to trash before clearing
        db.ref(path).once('value').then(snap=>{
          const val=snap.val();
          if(val){
            Object.entries(val).forEach(([id,data])=>{
              db.ref(trashPath).child(id).set({...data,deletedAt:new Date().toLocaleString('en-IN'),originalPath:path,bulkDeleted:true}).catch(e=>console.error(e));
            });
          }
          db.ref(path).remove().catch(e=>console.error(e));
        });
      } else {
        db.ref(path).remove().catch(e=>console.error(e));
      }
    } else {setRows([]);try{localStorage.removeItem(lsKey);}catch{}}
  },[path,lsKey]);

  return{rows,online,push,deleteOne,clearAll};
}

/* ── Fee calc ──────────────────────────────────────────── */
function calcFee(f){
  // Branch-aware fee lookup per image
  const BRANCH_FEE={
    'B.Tech':{
      'Computer Science & Engineering':98850,
      'Computer Science & Engineering (AI/ML)':115850,
      'Electronics & Communication':75000,
      'Mechanical Engineering':75000,
      'Civil Engineering':75000,
      'Electrical Engineering':75000,
    },
    'B.Tech (LEET)':{
      'CSE (LEET)':80000,'ECE (LEET)':60000,'ME (LEET)':60000,'Civil (LEET)':60000,'EE (LEET)':60000
    },
    'Diploma':{'Computer Science':36000,'Electrical':36000,'Civil':36000,'Mechanical':36000,'Electronics':36000},
    'BCA':{'Bachelor of Computer Applications':45750},
    'M.Tech':{'Computer Science & Engineering':60000,'Electronics & Communication Engineering':60000,'Electrical Engineering (Power Systems)':60000}
  };
  const base=(BRANCH_FEE[f.course]&&f.branch&&BRANCH_FEE[f.course][f.branch])?BRANCH_FEE[f.course][f.branch]:(FEE[f.course]?.y||0);
  const disc=0;
  const fy=Math.round(base-disc),fh=Math.round(fy/2),dep=parseFloat(f.deposited)||0;
  const pend=f.feeOption==='Yearly'?Math.max(0,fy-dep):Math.max(0,fh-dep);
  return{fy,fh,pend,disc:Math.round(disc)};
}

/* ══════════════════════════════════════════════════════════
   PHOTO UPLOAD COMPONENT
   Converts image to base64 for Firebase storage
══════════════════════════════════════════════════════════ */
function PhotoUpload({label,value,onChange}){
  const [preview,setPreview]=useState(value||'');
  const [uploading,setUploading]=useState(false);
  const [error,setError]=useState('');
  const inputRef=useRef(null);

  const handleFile=e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(!file.type.startsWith('image/')){setError('Please select an image file');return;}
    if(file.size>2*1024*1024){setError('Image must be under 2MB');return;}
    setError('');setUploading(true);
    const reader=new FileReader();
    reader.onload=ev=>{
      const b64=ev.target.result;
      setPreview(b64);
      onChange(b64);
      // Also try Firebase Storage if available
      if(window._STORAGE){
        const ref=window._STORAGE.ref('photos/'+Date.now()+'_'+file.name);
        ref.putString(b64,'data_url').then(snap=>snap.ref.getDownloadURL()).then(url=>{
          onChange(url);setPreview(url);
        }).catch(()=>{/* keep base64 */}).finally(()=>setUploading(false));
      } else {setUploading(false);}
    };
    reader.onerror=()=>{setError('Failed to read file');setUploading(false);};
    reader.readAsDataURL(file);
  };

  const clear=()=>{setPreview('');onChange('');if(inputRef.current)inputRef.current.value='';};

  return(
    <div style={{marginBottom:14}}>

  );
}

  const [paySlip,setPaySlip]=useState(null);
  const [paySlipFile,setPaySlipFile]=useState(null);
  const [paySlipErr,setPaySlipErr]=useState('');
  const ch=e=>{const{name,value}=e.target;setF(p=>({...p,[name]:value,...(name==='course'?{branch:''}:{})}));};
  const chDoc=(doc,e)=>{const file=e.target.files[0];if(file){setDocs(p=>({...p,[doc]:file.name}));setZipF(p=>({...p,[doc]:file}));}};
  const chPaySlip=e=>{
    const file=e.target.files[0];
    if(!file){setPaySlip(null);setPaySlipFile(null);setPaySlipErr('');return;}
    const allowed=['image/jpeg','image/png','image/webp','application/pdf'];
    if(!allowed.includes(file.type)){setPaySlipErr('Only JPG, PNG, WEBP or PDF allowed');return;}
    if(file.size>5*1024*1024){setPaySlipErr('File too large — max 5 MB');return;}
    setPaySlipErr('');
    setPaySlip({name:file.name,size:(file.size/1024).toFixed(1)+' KB',type:file.type});
    setPaySlipFile(file);
    const reader=new FileReader();
    reader.onload=ev=>setPaySlip(p=>({...p,dataUrl:ev.target.result}));
    reader.readAsDataURL(file);
  };

/* Sanitize phone → digits only, 91+10 for WA */
function cleanPhone(raw){
  const d=(raw||'').replace(/\D/g,'');
  if(d.length===12&&d.startsWith('91'))return{wa:'91'+d.slice(2)};
  if(d.length===10)return{wa:'91'+d};
  if(d.length===11&&d.startsWith('0'))return{wa:'91'+d.slice(1)};
  return{wa:d};
}

/* ── CommModal — per-student send panel ────────────────── */
function CommModal({student,onClose,onLog}){
  const [selTpl,setSelTpl]=useState(MSG_TEMPLATES[0].id);
  const [msgText,setMsgText]=useState('');
  const [emailSubject,setEmailSubject]=useState('');
  const [result,setResult]=useState(null);

  const tpl=MSG_TEMPLATES.find(t=>t.id===selTpl)||MSG_TEMPLATES[0];

  useEffect(()=>{
    setMsgText(tpl.text(student));
    setEmailSubject(`${tpl.label} — HCE Sonipat Admission Cell`);
    setResult(null);
  },[selTpl,student]);

  const phone=cleanPhone(student.phone||'');
  const hasEmail=!!(student.email||'').trim();

  const openWhatsApp=()=>{
    const url=`https://wa.me/${phone.wa}?text=${encodeURIComponent(msgText)}`;
    window.open(url,'_blank');
    onLog({studentId:student.id,studentName:student.name,phone:student.phone,email:student.email,channel:'WhatsApp',template:tpl.label,preview:msgText.slice(0,80),sentAt:new Date().toLocaleString('en-IN')});
    setResult({ok:true,msg:'WhatsApp opened — message pre-filled ✓'});
  };

  const openEmail=()=>{
    if(!hasEmail){setResult({ok:false,msg:'No email address on record for this student.'});return;}
    const gmailUrl=`https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(student.email)}&su=${encodeURIComponent(emailSubject)}&body=${encodeURIComponent(msgText)}`;
    window.open(gmailUrl,'_blank');
    onLog({studentId:student.id,studentName:student.name,phone:student.phone,email:student.email,channel:'Email',template:tpl.label,preview:msgText.slice(0,80),sentAt:new Date().toLocaleString('en-IN')});
    setResult({ok:true,msg:`Email client opened for ${student.email} ✓`});
  };

  return(
    <div className="comm-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="comm-box">
        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
          <div>
            <div style={{fontWeight:900,fontSize:16,marginBottom:2}}>📤 Send Message</div>
            <div style={{fontSize:12,color:'rgba(255,255,255,.45)'}}>{student.name} · {student.phone}{student.email?' · '+student.email:' · no email'}</div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,.08)',border:'none',color:'#fff',borderRadius:8,padding:'5px 10px',cursor:'pointer',fontSize:14,fontFamily:'inherit'}}>✕</button>
        </div>

        {/* Template picker */}
        <div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.45)',marginBottom:7,letterSpacing:.5}}>CHOOSE TEMPLATE</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:6,marginBottom:14}}>
          {MSG_TEMPLATES.map(t=>(
            <button key={t.id} onClick={()=>setSelTpl(t.id)} className={`tpl-card ${selTpl===t.id?'sel':''}`}>
              <div style={{fontSize:15,marginBottom:2}}>{t.icon}</div>
              <div style={{fontWeight:800,fontSize:11,color:selTpl===t.id?'#60a5fa':'#fff',marginBottom:1}}>{t.label}</div>
              <div style={{fontSize:9,color:'rgba(255,255,255,.35)',lineHeight:1.4}}>{t.desc}</div>
            </button>
          ))}
        </div>

        {/* Email subject (shown above message) */}
        <div style={{marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.45)',marginBottom:4,letterSpacing:.5}}>EMAIL SUBJECT</div>
          <input className="inp" value={emailSubject} onChange={e=>setEmailSubject(e.target.value)} placeholder="Email subject…" style={{fontSize:13}}/>
        </div>

        {/* Message editor */}
        <div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.45)',marginBottom:4,letterSpacing:.5}}>MESSAGE BODY (WhatsApp & Email)</div>
        <textarea className="inp msg-preview" value={msgText} onChange={e=>setMsgText(e.target.value)} style={{minHeight:140,fontSize:12,lineHeight:1.65}}/>

        {/* Result */}
        {result&&(
          <div style={{padding:'9px 13px',borderRadius:9,marginBottom:10,fontSize:12,fontWeight:600,
            background:result.ok?'rgba(16,185,129,.12)':'rgba(239,68,68,.12)',

            color:result.ok?'#34d399':'#f87171'}}>
            {result.ok?'✓ ':'✕ '}{result.msg}

        {/* Action buttons */}

/* ── BulkCommPanel — send to multiple students ─────────── */
function BulkCommPanel({applications,inquiries,commLogs,onLog}){
  const [audience,setAudience]=useState('all');
  const [courseFilter,setCourseFilter]=useState('');
  const [selTpl,setSelTpl]=useState(MSG_TEMPLATES[0].id);
  const [progress,setProgress]=useState(null);

  const allStudents=[
    ...applications.map(a=>({...a,_src:'admission'})),
    ...inquiries.map(a=>({...a,_src:'inquiry'}))
  ];

  const filtered=allStudents.filter(s=>{
    if(audience==='admissions'&&s._src!=='admission')return false;
    if(audience==='inquiries'&&s._src!=='inquiry')return false;
    if(courseFilter&&s.course!==courseFilter)return false;
    return true;
  });

  const withEmail=filtered.filter(s=>(s.email||'').trim());
  const tpl=MSG_TEMPLATES.find(t=>t.id===selTpl)||MSG_TEMPLATES[0];

  const sendBulkWA=()=>{
    if(!filtered.length){alert('No students match this filter.');return;}
    filtered.forEach((s,i)=>{
      setTimeout(()=>{
        const msg=tpl.text(s);
        const p=cleanPhone(s.phone||'');
        if(i===0){window.open(`https://wa.me/${p.wa}?text=${encodeURIComponent(msg)}`,'_blank');}
        onLog({studentId:s.id,studentName:s.name,phone:s.phone,email:s.email,channel:'WhatsApp',template:tpl.label,preview:msg.slice(0,80),sentAt:new Date().toLocaleString('en-IN')});
      },i*200);
    });
    setProgress({ok:true,msg:`WhatsApp opened for first student. ${filtered.length} messages logged.`});
  };

  const sendBulkEmail=()=>{
    if(!withEmail.length){alert('No students with email addresses in this filter.');return;}
    // Build a mailto with all addresses in BCC so one click opens draft
    const subject=encodeURIComponent(`${tpl.label} — HCE Sonipat Admission Cell`);
    const body=encodeURIComponent(tpl.text({name:'[Student Name]',course:'[Course]',branch:'[Branch]',id:'[ID]'}));
    const bcc=withEmail.map(s=>s.email).join(',');
    const gmailBulk=`https://mail.google.com/mail/?view=cm&bcc=${encodeURIComponent(bcc)}&su=${subject}&body=${body}`;
    window.open(gmailBulk,'_blank');
    withEmail.forEach((s,i)=>{
      setTimeout(()=>{
        const msg=tpl.text(s);
        onLog({studentId:s.id,studentName:s.name,phone:s.phone,email:s.email,channel:'Email',template:tpl.label,preview:msg.slice(0,80),sentAt:new Date().toLocaleString('en-IN')});
      },i*100);
    });
    setProgress({ok:true,msg:`Email client opened with ${withEmail.length} addresses in BCC. ${filtered.length-withEmail.length} skipped (no email).`});
  };

  return(
    <div className="fade-in">
      <div style={{fontWeight:800,fontSize:15,marginBottom:4}}>📣 Bulk Communication</div>
      <div style={{color:'rgba(255,255,255,.38)',fontSize:12,marginBottom:16}}>Send WhatsApp or Email to many students at once</div>

      {/* Audience & filters */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
        <div className="field">
          <label>Audience</label>
          <select className="inp" value={audience} onChange={e=>setAudience(e.target.value)}>
            <option value="all">All Students ({allStudents.length})</option>
            <option value="admissions">Admitted Only ({applications.length})</option>
            <option value="inquiries">Inquiries Only ({inquiries.length})</option>
          </select>
        </div>
        <div className="field">
          <label>Filter by Course</label>
          <select className="inp" value={courseFilter} onChange={e=>setCourseFilter(e.target.value)}>
            <option value="">All Courses</option>
            {COURSES.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
      </div>

      {/* Target count */}
      <div style={{background:'rgba(37,99,235,.1)',border:'1px solid rgba(96,165,250,.22)',borderRadius:10,padding:'9px 14px',marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
        <div>
          <div style={{fontSize:11,color:'rgba(255,255,255,.55)'}}>Target recipients</div>
          <div style={{fontWeight:900,fontSize:18,color:'#60a5fa'}}>{filtered.length} students</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:11,color:'rgba(255,255,255,.55)'}}>With email</div>
          <div style={{fontWeight:800,fontSize:15,color:'#60a5fa'}}>{withEmail.length} / {filtered.length}</div>
        </div>
      </div>

      {/* Template picker */}
      <div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.45)',marginBottom:7,letterSpacing:.5}}>SELECT TEMPLATE</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:6,marginBottom:14}}>
        {MSG_TEMPLATES.map(t=>(
          <button key={t.id} onClick={()=>setSelTpl(t.id)} className={`tpl-card ${selTpl===t.id?'sel':''}`}>
            <div style={{fontSize:14,marginBottom:2}}>{t.icon}</div>
            <div style={{fontWeight:800,fontSize:11,color:selTpl===t.id?'#60a5fa':'#fff'}}>{t.label}</div>
          </button>
        ))}
      </div>

      {/* Preview with sample */}
      {filtered[0]&&(
        <div>
          <div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.45)',marginBottom:4,letterSpacing:.5}}>PREVIEW (first student)</div>
          <div className="msg-preview">{tpl.text(filtered[0])}</div>
        </div>
      )}

      {/* Progress */}
      {progress&&(
        <div style={{padding:'9px 13px',borderRadius:9,marginBottom:10,fontSize:12,fontWeight:600,
          background:progress.ok?'rgba(16,185,129,.12)':'rgba(239,68,68,.12)',
          border:`1px solid ${progress.ok?'rgba(16,185,129,.3)':'rgba(239,68,68,.3)'}`,
          color:progress.ok?'#34d399':'#f87171'}}>
          ✓ {progress.msg}
        </div>
      )}

      <div style={{display:'flex',gap:8}}>
        <button className="btn-wa" onClick={sendBulkWA} disabled={!filtered.length} style={{opacity:!filtered.length?.5:1}}>
          💬 WhatsApp All ({filtered.length})
        </button>
        <button className="btn-email" onClick={sendBulkEmail} disabled={!withEmail.length} style={{opacity:!withEmail.length?.4:1}}>
          ✉️ Email All ({withEmail.length})
        </button>
      </div>
      <div style={{fontSize:10,color:'rgba(255,255,255,.22)',marginTop:8,textAlign:'center'}}>
        WhatsApp: opens first student · Email: opens Gmail compose with all addresses in BCC
      </div>
    </div>
  );
}

                <div style={{fontSize:9,color:'rgba(255,255,255,.25)',marginTop:2}}>{l.sentAt}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   TASKS & REMINDERS PANEL
══════════════════════════════════════════════════════════ */
function TasksPanel(){
  const [tasks,setTasks]=useState(()=>{try{return JSON.parse(localStorage.getItem('hce_tasks')||'[]');}catch{return [];}});
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({title:'',type:TASK_TYPES[0],dueDate:'',studentName:'',note:'',done:false});
  const [filter,setFilter]=useState('all');

  const save=ts=>{setTasks(ts);try{localStorage.setItem('hce_tasks',JSON.stringify(ts));}catch{}};
  const addTask=()=>{
    if(!form.title.trim()||!form.dueDate){alert('Title and due date required');return;}
    const t={...form,id:'T-'+Date.now(),createdAt:new Date().toLocaleString('en-IN')};
    save([...tasks,t]);setShowAdd(false);setForm({title:'',type:TASK_TYPES[0],dueDate:'',studentName:'',note:'',done:false});
  };
  const toggleDone=id=>save(tasks.map(t=>t.id===id?{...t,done:!t.done}:t));
  const deleteTask=id=>save(tasks.filter(t=>t.id!==id));

  const today=new Date().toISOString().slice(0,10);
  const classify=t=>{
    if(t.done)return'done-task';
    if(t.dueDate<today)return'overdue';
    if(t.dueDate===today)return'due-today';
    return'upcoming';
  };
  const filtered=tasks.filter(t=>{
    if(filter==='pending')return!t.done;
    if(filter==='today')return!t.done&&t.dueDate===today;
    if(filter==='overdue')return!t.done&&t.dueDate<today;
    return true;
  }).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));

  const counts={overdue:tasks.filter(t=>!t.done&&t.dueDate<today).length,today:tasks.filter(t=>!t.done&&t.dueDate===today).length,pending:tasks.filter(t=>!t.done).length};

  return(
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14,flexWrap:'wrap',gap:8}}>
        <div>
          <div style={{fontWeight:800,fontSize:15,marginBottom:2}}>✅ Tasks & Reminders</div>
          <div style={{color:'rgba(255,255,255,.38)',fontSize:12}}>Follow-ups, callbacks & pending actions</div>
        </div>
        <button onClick={()=>setShowAdd(v=>!v)} className="btn-blue" style={{width:'auto',padding:'9px 16px',fontSize:13}}>+ Add Task</button>
      </div>

      {/* Quick counts */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14}}>
        {[{l:'Overdue',v:counts.overdue,c:'#f87171'},{l:'Due Today',v:counts.today,c:'#fbbf24'},{l:'Pending',v:counts.pending,c:'#60a5fa'}].map((s,i)=>(
          <div key={i} className="mini-stat">
            <div style={{fontSize:20,fontWeight:900,color:s.c}}>{s.v}</div>
            <div style={{fontSize:10,color:'rgba(255,255,255,.4)',marginTop:1}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* Add form */}
      {showAdd&&(
        <div className="glass-sm" style={{padding:16,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:'#60a5fa'}}>➕ New Task</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9,marginBottom:9}}>
            <div className="field"><label>Task Title *</label><input className="inp" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} placeholder="e.g. Call back Rahul"/></div>
            <div className="field"><label>Type</label>
              <select className="inp" value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))}>
                {TASK_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div className="field"><label>Due Date *</label><input className="inp" type="date" value={form.dueDate} onChange={e=>setForm(p=>({...p,dueDate:e.target.value}))}/></div>
            <div className="field"><label>Student Name</label><input className="inp" value={form.studentName} onChange={e=>setForm(p=>({...p,studentName:e.target.value}))} placeholder="Optional"/></div>
          </div>
          <div className="field" style={{marginBottom:10}}><label>Notes</label><textarea className="inp" value={form.note} onChange={e=>setForm(p=>({...p,note:e.target.value}))} placeholder="Additional details…" style={{minHeight:60}}/></div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn-blue btn-sm" onClick={addTask} style={{flex:1}}>✓ Save Task</button>
            <button className="btn-ghost btn-sm" onClick={()=>setShowAdd(false)} style={{flex:1}}>Cancel</button>
          </div>
        </div>
      )}

      {/* Filter tabs */}
      <div className="tab-bar" style={{marginBottom:12}}>
        {[{id:'all',l:'All'},{id:'pending',l:'Pending'},{id:'today',l:'Today'},{id:'overdue',l:'Overdue'}].map(f=>(
          <button key={f.id} className={`tab-btn ${filter===f.id?'tab-on':'tab-off'}`} onClick={()=>setFilter(f.id)}>{f.l}</button>
        ))}
      </div>

      {/* Task list */}
      {filtered.map(t=>(
        <div key={t.id} className={`task-card ${classify(t)}`}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3,flexWrap:'wrap'}}>
                <span style={{fontWeight:700,fontSize:13,textDecoration:t.done?'line-through':'none',color:t.done?'rgba(255,255,255,.4)':'#fff'}}>{t.title}</span>
                <span style={{fontSize:9,background:'rgba(255,255,255,.08)',borderRadius:5,padding:'1px 6px',color:'rgba(255,255,255,.5)',fontWeight:600}}>{t.type}</span>
                {t.studentName&&<span style={{fontSize:10,color:'#60a5fa',fontWeight:600}}>👤 {t.studentName}</span>}
              </div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                <span style={{fontSize:10,color:classify(t)==='overdue'?'#f87171':classify(t)==='due-today'?'#fbbf24':'rgba(255,255,255,.4)',fontWeight:600}}>
                  📅 {t.dueDate}{classify(t)==='overdue'?' (OVERDUE)':classify(t)==='due-today'?' (TODAY)':''}
                </span>
                {t.note&&<span style={{fontSize:10,color:'rgba(255,255,255,.35)'}}>{t.note}</span>}
              </div>
            </div>
            <div style={{display:'flex',gap:5,flexShrink:0}}>
              <button onClick={()=>toggleDone(t.id)} style={{background:t.done?'rgba(16,185,129,.15)':'rgba(255,255,255,.06)',border:`1px solid ${t.done?'rgba(16,185,129,.4)':'rgba(255,255,255,.1)'}`,color:t.done?'#34d399':'rgba(255,255,255,.5)',borderRadius:7,padding:'4px 9px',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
                {t.done?'✓ Done':'○'}
              </button>
              <button onClick={()=>deleteTask(t.id)} className="del-btn">🗑️</button>
            </div>
          </div>
        </div>
      ))}
      {filtered.length===0&&<p style={{textAlign:'center',color:'rgba(255,255,255,.25)',fontSize:13,padding:20}}>No tasks in this filter.</p>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   ANALYTICS PANEL
══════════════════════════════════════════════════════════ */
function AnalyticsPanel({applications,inquiries,genReport,dlExcel}){
  const all=[...applications];
  const totalFeeCollected=all.reduce((s,a)=>s+(parseFloat(a.deposited)||0),0);
  const totalFeePending=all.reduce((s,a)=>s+(a.feeInfo?.pending||0),0);
  const totalFeeExpected=all.reduce((s,a)=>s+(a.feeInfo?.finalYearly||0),0);
  const collectionPct=totalFeeExpected>0?Math.round(totalFeeCollected/totalFeeExpected*100):0;

  // Course breakdown
  const byCourse={};
  COURSES.forEach(c=>{byCourse[c]=all.filter(a=>a.course===c).length;});
  const maxCourse=Math.max(...Object.values(byCourse),1);

  // Branch breakdown (all branches across all courses)
  const branchMap={};
  all.forEach(a=>{if(a.branch){branchMap[a.branch]=(branchMap[a.branch]||0)+1;}});
  const branchEntries=Object.entries(branchMap).sort((x,y)=>y[1]-x[1]);
  const maxBranch=Math.max(...branchEntries.map(e=>e[1]),1);

  // Status breakdown
  const byStatus={};
  STATUS_FLOW.forEach(s=>{byStatus[s]=all.filter(a=>a.status===s).length;});


  // Daily trend last 7 days
  const days=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push({label:d.toLocaleDateString('en-IN',{weekday:'short'}),date:d.toLocaleDateString('en-IN'),count:0});}
  all.forEach(a=>{const d=days.find(x=>a.submittedAt?.startsWith(x.date));if(d)d.count++;});
  const maxDay=Math.max(...days.map(d=>d.count),1);

  // Inquiry conversion
  const convRate=inquiries.length>0?Math.round(all.length/(all.length+inquiries.length)*100):0;

  const fmtINR=n=>(n>=100000?`₹${(n/100000).toFixed(1)}L`:n>=1000?`₹${(n/1000).toFixed(0)}K`:`₹${n}`);

  return(
    <div className="fade-in">
      <div style={{fontWeight:800,fontSize:15,marginBottom:4}}>📊 Analytics & Reports</div>
      <div style={{color:'rgba(255,255,255,.38)',fontSize:12,marginBottom:12}}>Live insights from your admission data</div>

      {/* Report generation buttons */}

        <div style={{fontWeight:700,fontSize:11,color:'#60a5fa',marginBottom:10,letterSpacing:.5}}>🖨️ GENERATE PRINTABLE REPORT (opens print dialog)</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:10}}>
          {[
            {label:'📄 Daily — Combined',click:()=>genReport('daily','both'),bg:'rgba(37,99,235,.2)',border:'rgba(96,165,250,.3)',col:'#60a5fa'},
            {label:'📅 Weekly — Combined',click:()=>genReport('weekly','both'),bg:'rgba(37,99,235,.2)',border:'rgba(96,165,250,.3)',col:'#60a5fa'},
            {label:'📆 Monthly — Combined',click:()=>genReport('monthly','both'),bg:'rgba(37,99,235,.2)',border:'rgba(96,165,250,.3)',col:'#60a5fa'},
          ].map((b,i)=>(
            <button key={i} onClick={b.click} style={{padding:'10px 8px',borderRadius:9,border:`1px solid ${b.border}`,background:b.bg,color:b.col,fontFamily:'inherit',fontWeight:800,fontSize:11,cursor:'pointer',textAlign:'center'}}>{b.label}</button>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8,marginBottom:10}}>
          {[
            {label:'🎓 Applications Only Report',click:()=>genReport('monthly','apps'),bg:'rgba(37,99,235,.25)',border:'rgba(96,165,250,.4)',col:'#93c5fd'},
            {label:'💬 Inquiries Only Report',click:()=>genReport('monthly','inqs'),bg:'rgba(180,83,9,.25)',border:'rgba(245,158,11,.35)',col:'#fcd34d'},
          ].map((b,i)=>(

        <div className="glass-sm" style={{padding:14}}>
          <div style={{fontWeight:700,fontSize:12,marginBottom:10,color:'rgba(255,255,255,.6)'}}>🔄 By Status</div>

          ))}
        </div>
      </div>

      {/* Branch breakdown */}
      <div className="glass-sm" style={{padding:14,marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:12,marginBottom:10,color:'rgba(255,255,255,.6)'}}>🏛️ By Branch</div>
        {branchEntries.length===0?(
          <div style={{fontSize:12,color:'rgba(255,255,255,.28)',textAlign:'center',padding:'10px 0'}}>No branch data yet</div>

          <div key={branch} style={{marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3}}>

            </div>
          </div>
        ))}
      </div>

    </div>
  );
}

  );
}

/* ══════════════════════════════════════════════════════════
   DOCUMENT CHECKLIST PANEL
══════════════════════════════════════════════════════════ */
function DocChecklistPanel({applications,onUpdateDocs}){
  const [selId,setSelId]=useState('');
  const app=applications.find(a=>a.id===selId);
  const [localDocs,setLocalDocs]=useState({});

  useEffect(()=>{if(app)setLocalDocs({...(app.uploadedDocs||{})});},[selId]);

  const toggle=(doc)=>{
    const updated={...localDocs,[doc]:localDocs[doc]?'':new Date().toLocaleDateString('en-IN')};
    setLocalDocs(updated);
    if(app)onUpdateDocs(app.id,updated);
  };

  const pct=app?Math.round(Object.values(localDocs).filter(Boolean).length/REQ_DOCS.length*100):0;

  return(
    <div className="fade-in">
      <div style={{fontWeight:800,fontSize:15,marginBottom:4}}>📎 Document Checklist</div>
      <div style={{color:'rgba(255,255,255,.38)',fontSize:12,marginBottom:16}}>Verify & mark received documents per student</div>

      <div className="field" style={{marginBottom:14}}>
        <label>Select Student</label>
        <select className="inp" value={selId} onChange={e=>setSelId(e.target.value)}>
          <option value="">— Choose admitted student —</option>
          {applications.slice().reverse().map(a=><option key={a.id} value={a.id}>{a.name} ({a.id})</option>)}
        </select>
      </div>

      {app&&(
        <>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
            <div className="bar-track"><div className="bar-fill" style={{width:`${pct}%`,background:pct===100?'linear-gradient(90deg,#10b981,#34d399)':'linear-gradient(90deg,#f59e0b,#fbbf24)'}}/></div>
            <span style={{fontWeight:800,color:pct===100?'#34d399':'#fbbf24',fontSize:14,flexShrink:0}}>{pct}%</span>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {REQ_DOCS.map(doc=>(
              <div key={doc} onClick={()=>toggle(doc)} className="glass-sm" style={{padding:'12px 14px',display:'flex',alignItems:'center',gap:10,cursor:'pointer',borderLeft:`3px solid ${localDocs[doc]?'#22c55e':'#f59e0b'}`,transition:'all .15s'}}>
                <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${localDocs[doc]?'#22c55e':'rgba(255,255,255,.2)'}`,background:localDocs[doc]?'rgba(34,197,94,.2)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0,transition:'all .15s'}}>
                  {localDocs[doc]?'✓':''}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13}}>{doc}</div>
                  {localDocs[doc]&&<div style={{fontSize:10,color:'#34d399',marginTop:1}}>Received: {localDocs[doc]}</div>}
                </div>
                <span style={{fontSize:10,color:localDocs[doc]?'#34d399':'#fb923c',fontWeight:700}}>{localDocs[doc]?'✓ OK':'Missing'}</span>
              </div>
            ))}
          </div>
          <div style={{marginTop:12,padding:'9px 13px',borderRadius:9,background:pct===100?'rgba(16,185,129,.1)':'rgba(245,158,11,.08)',border:`1px solid ${pct===100?'rgba(16,185,129,.3)':'rgba(245,158,11,.25)'}`,fontSize:12,fontWeight:600,color:pct===100?'#34d399':'#fbbf24',textAlign:'center'}}>
            {pct===100?'✅ All documents received — Student is document-complete!':'⚠️ '+(REQ_DOCS.length-Object.values(localDocs).filter(Boolean).length)+' document(s) still pending'}
          </div>

          {/* Payment Slip viewer */}
          <div style={{marginTop:14,padding:'14px',borderRadius:12,background:'rgba(37,99,235,.07)',border:'1px solid rgba(96,165,250,.2)'}}>
            <div style={{fontWeight:700,fontSize:12,marginBottom:8,color:'#60a5fa'}}>💳 Payment Slip</div>
            {app.paymentSlip?(
              <div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,flexWrap:'wrap'}}>
                  <span style={{fontSize:20}}>{app.paymentSlip.type==='application/pdf'?'📄':'🖼️'}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:12,color:'#34d399',wordBreak:'break-all'}}>{app.paymentSlip.name}</div>
                    <div style={{fontSize:10,color:'rgba(255,255,255,.4)',marginTop:1}}>{app.paymentSlip.size}</div>
                  </div>
                  <span style={{fontSize:10,background:'rgba(16,185,129,.15)',color:'#34d399',border:'1px solid rgba(16,185,129,.3)',borderRadius:999,padding:'2px 8px',fontWeight:700}}>✓ Uploaded</span>
                </div>
                {app.paymentSlip.dataUrl&&app.paymentSlip.type!=='application/pdf'&&(
                  <div style={{borderRadius:9,overflow:'hidden',background:'rgba(0,0,0,.35)',textAlign:'center',maxHeight:200}}>
                    <img src={app.paymentSlip.dataUrl} alt="Payment slip" style={{maxWidth:'100%',maxHeight:200,objectFit:'contain'}}/>
                  </div>
                )}
                {app.paymentSlip.type==='application/pdf'&&(
                  <div style={{fontSize:11,color:'rgba(255,255,255,.45)',textAlign:'center',padding:'8px 0'}}>PDF slip — included in ZIP export</div>
                )}
              </div>
            ):(
              <div style={{fontSize:12,color:'rgba(255,255,255,.32)',fontStyle:'italic'}}>No payment slip uploaded by student</div>
            )}
          </div>
        </>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   BRANCH-WISE DAILY REPORT PANEL
   - Date picker to select any past/current date
   - Shows branch-wise totals for applications + inquiries
   - Print button to open printable report in overlay
══════════════════════════════════════════════════════════ */
function BranchDailyPanel({applications,inquiries}){
  const todayStr=new Date().toISOString().slice(0,10);
  const [selDate,setSelDate]=useState(todayStr);

  const parseRec=(str)=>{
    if(!str)return null;
    // Handle Indian locale format: "22/5/2026, 11:06:47 am"
    const inM=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if(inM)return new Date(parseInt(inM[3]),parseInt(inM[2])-1,parseInt(inM[1]));
    // Handle ISO format: "2026-05-22T..."
    const isoM=str.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(isoM)return new Date(parseInt(isoM[1]),parseInt(isoM[2])-1,parseInt(isoM[3]));
    // Fallback
    const d=new Date(str);if(!isNaN(d))return d;
    return null;
  };

  const toLocalDateStr=(d)=>{
    if(!d)return '';
    const yyyy=d.getFullYear();
    const mm=String(d.getMonth()+1).padStart(2,'0');
    const dd=String(d.getDate()).padStart(2,'0');
    return `${yyyy}-${mm}-${dd}`;
  };

  const matchDate=(rec,dateStr)=>{
    const d=parseRec(rec.submittedAt);
    if(!d)return false;
    return toLocalDateStr(d)===dateStr;
  };

  const dayApps=applications.filter(a=>matchDate(a,selDate));
  const dayInqs=inquiries.filter(a=>matchDate(a,selDate));

  // Branch-wise grouping
  const branchMap={};
  dayApps.forEach(a=>{
    const key=(a.course||'Unknown')+' — '+(a.branch||'Unknown');
    if(!branchMap[key])branchMap[key]={branch:a.branch||'Unknown',course:a.course||'Unknown',apps:0,inqs:0,confirmed:0,deposited:0,pending:0};
    branchMap[key].apps++;
    if(['Admission Confirmed','Enrolled'].includes(a.status))branchMap[key].confirmed++;
    branchMap[key].deposited+=(parseFloat(a.deposited)||0);
    branchMap[key].pending+=(a.feeInfo?.pending||0);
  });
  dayInqs.forEach(a=>{
    const key=(a.course||'Unknown')+' — '+(a.branch||'Unknown');
    if(!branchMap[key])branchMap[key]={branch:a.branch||'Unknown',course:a.course||'Unknown',apps:0,inqs:0,confirmed:0,deposited:0,pending:0};
    branchMap[key].inqs++;
  });

  const rows=Object.entries(branchMap).sort((a,b)=>a[0].localeCompare(b[0]));
  const totalApps=dayApps.length,totalInqs=dayInqs.length;
  const totalDep=dayApps.reduce((s,a)=>s+(parseFloat(a.deposited)||0),0);
  const totalPend=dayApps.reduce((s,a)=>s+(a.feeInfo?.pending||0),0);
  const totalConf=dayApps.filter(a=>['Admission Confirmed','Enrolled'].includes(a.status)).length;

  const fmtINR=n=>`₹${(n||0).toLocaleString('en-IN')}`;
  const displayDate=new Date(selDate+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const printReport=()=>{
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Branch Daily Report — ${selDate} — HCE Sonipat</title><style>

      .date-tag{display:inline-block;background:#0f766e;color:#fff;border-radius:4px;padding:3px 16px;font-size:13px;font-weight:700;margin-top:5px;margin-left:8px}

      .sum-card .v{font-size:28px;font-weight:900}
      .sum-card .l{font-size:11px;color:#94a3b8;margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
      .section-hd{font-size:16px;font-weight:900;color:#1e40af;margin:20px 0 10px;padding:8px 14px;background:#eff6ff;border-left:4px solid #1e40af;border-radius:0 6px 6px 0}
      .section-hd-amber{background:#fef3c7;border-color:#b45309;color:#92400e}

      th{padding:9px 10px;background:#1e40af;color:#fff;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;white-space:nowrap}

        ${rows.length>0?`<tr class="total-row">

function AdminSection({applications,inquiries,online,onLogout,onDeleteApp,onDeleteInq,onClearApps,onClearInqs,commLogs,onLog,onClearLogs,onUpdateStatus,onUpdateDocs,onConvertInquiry,onEditRecord,trashApps,trashInqs,onRestoreApp,onRestoreInq,onPermDeleteTrashApp,onPermDeleteTrashInq,onClearTrashApps,onClearTrashInqs}){
  const [tab,setTab]=useState('admissions');
  const [commSubTab,setCommSubTab]=useState('bulk');
  const [search,setSearch]=useState('');
  const [filterBranch,setFilterBranch]=useState('');
  const [filterCourse,setFilterCourse]=useState('');
  const [filterStatus,setFilterStatus]=useState('');
  const [filterDateFrom,setFilterDateFrom]=useState('');
  const [filterDateTo,setFilterDateTo]=useState('');
  const [commStudent,setCommStudent]=useState(null);
  const [confirmModal,setConfirmModal]=useState(null);

  const parseRecordDate=(str)=>{
    if(!str)return null;
    // Indian locale format: "22/5/2026, 11:06:47 am" — parse as local date
    const inM=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if(inM)return new Date(parseInt(inM[3]),parseInt(inM[2])-1,parseInt(inM[1]));
    // ISO format: "2026-05-22T..." — parse date part only as local
    const isoM=str.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(isoM)return new Date(parseInt(isoM[1]),parseInt(isoM[2])-1,parseInt(isoM[3]));
    const d=new Date(str);if(!isNaN(d))return d;
    return null;
  };
  const applyFilters=(arr)=>arr.filter(a=>{
    const q=search.toLowerCase();
    const matchQ=!q||(a.name||'').toLowerCase().includes(q)||(a.id||'').includes(q)||(a.phone||'').includes(q)||(a.email||'').toLowerCase().includes(q)||(a.aadharNo||'').includes(q);
    const matchBranch=!filterBranch||(a.branch||'')===filterBranch;
    const matchCourse=!filterCourse||(a.course||'')===filterCourse;
    const matchStatus=!filterStatus||(a.status||'')===filterStatus;
    let matchDate=true;
    if(filterDateFrom||filterDateTo){
      const d=parseRecordDate(a.submittedAt);
      if(d){
        if(filterDateFrom){const from=new Date(filterDateFrom+'T00:00:00');matchDate=matchDate&&d>=from;}
        if(filterDateTo){const to=new Date(filterDateTo+'T23:59:59');matchDate=matchDate&&d<=to;}
      }else{matchDate=false;}
    }
    return matchQ&&matchBranch&&matchCourse&&matchStatus&&matchDate;
  });
  const fApps=applyFilters(applications);
  const fInqs=applyFilters(inquiries);
  const allBranches=[...new Set([...applications,...inquiries].map(a=>a.branch).filter(Boolean))].sort();
  const today=new Date().toLocaleDateString('en-IN');
  const stats={total:applications.length,today:applications.filter(a=>a.submittedAt?.includes(today)).length,pending:applications.filter(a=>['Submitted','Documents Verified'].includes(a.status)).length,confirmed:applications.filter(a=>['Admission Confirmed','Enrolled'].includes(a.status)).length,inq:inquiries.length};

  // ── Edit state ──
  const [editRecord,setEditRecord]=React.useState(null); // {record, type}

  const askClearInqs=()=>setConfirmModal({

    msg:'This will permanently delete ALL student inquiries from Firebase and cannot be undone.',
    count:inquiries.length, label:'Inquiries',
    onConfirm:()=>{onClearInqs();setConfirmModal(null);}
  });
  const askDeleteOne=(id,name,isApp)=>setConfirmModal({
    icon:'⚠️',title:`Delete Record`,
    msg:`Delete the record for "${name}"? This cannot be undone.`,
    count:null, label:null,
    onConfirm:()=>{isApp?onDeleteApp(id):onDeleteInq(id);setConfirmModal(null);}
  });

  const genReport=(type,dataSet='both')=>{
    const now=new Date();
    let appRows=[], inqRows=[], title, sub;

    const parseDate=str=>{
      if(!str)return null;
      // Indian locale: "22/5/2026, 11:06:47 am"
      const inM=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if(inM)return new Date(parseInt(inM[3]),parseInt(inM[2])-1,parseInt(inM[1]));
      // ISO: "2026-05-22T..."
      const isoM=str.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if(isoM)return new Date(parseInt(isoM[1]),parseInt(isoM[2])-1,parseInt(isoM[3]));
      const d=new Date(str);if(!isNaN(d))return d;
      return null;
    };

    const filterByDate=(arr,t)=>{
      if(t==='daily'){
        const td=now.getDate(),tm=now.getMonth(),ty=now.getFullYear();
        return arr.filter(a=>{const d=parseDate(a.submittedAt);return d&&d.getDate()===td&&d.getMonth()===tm&&d.getFullYear()===ty;});
      } else if(t==='weekly'){
        const ws=new Date(now);ws.setDate(ws.getDate()-6);ws.setHours(0,0,0,0);
        const we=new Date(now);we.setHours(23,59,59,999);
        return arr.filter(a=>{const d=parseDate(a.submittedAt);return d&&d>=ws&&d<=we;});
      } else {
        const mm=now.getMonth(),my=now.getFullYear();
        return arr.filter(a=>{const d=parseDate(a.submittedAt);return d&&d.getMonth()===mm&&d.getFullYear()===my;});
      }
    };

    if(type==='daily'){title='DAILY REPORT';sub=`Date: ${now.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}`;}
    else if(type==='weekly'){const ws=new Date(now);ws.setDate(ws.getDate()-6);title='WEEKLY REPORT';sub=`${ws.toLocaleDateString('en-IN')} – ${now.toLocaleDateString('en-IN')} (Last 7 days)`;}
    else{title='MONTHLY REPORT';sub=`Month: ${now.toLocaleString('en-IN',{month:'long',year:'numeric'})}`;}

    const rawApps=filterByDate(applications,type);

    const fmtINR=n=>`₹${(n||0).toLocaleString('en-IN')}`;

    const totalPending=appRows.reduce((s,a)=>s+(a.feeInfo?.pending||0),0);
    const confirmed=appRows.filter(a=>['Admission Confirmed','Enrolled'].includes(a.status)).length;

    let html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title} — HCE Sonipat</title><style>

      table{width:100%;border-collapse:collapse;margin:10px 0 20px;font-size:13px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}

    (function printViaIframe(htmlContent){

      cb.style.cssText='background:#dc2626;color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:800;cursor:pointer;pointer-events:auto;';
      cb.onclick=function(ev){ev.stopPropagation();ov.remove();};
      bar.appendChild(pb);bar.appendChild(cb);

      ifr.srcdoc=htmlContent;
      ov.appendChild(bar);ov.appendChild(ifr);
      ov.addEventListener('click',function(ev){if(ev.target===ov)ov.remove();});
      document.body.appendChild(ov);
    })(html);
  };

/* ══════════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════════ */
function App(){
  const [view,setView]=useState('Home');
  const [progLevel,setProgLevel]=useState('B.Tech');
  const [adminMode,setAdminMode]=useState(false);
  const [showLogin,setShowLogin]=useState(false);
  const [loginUser,setLoginUser]=useState('');
  const [loginPass,setLoginPass]=useState('');
  const [toast,setToast]=useState(null);
  const [showRules,setShowRules]=useState(false);
  const [drawerOpen,setDrawerOpen]=useState(false);

  const {rows:applications,online:appOnline,push:pushApp,deleteOne:deleteApp,clearAll:clearApps}=useFirebaseList('applications','hce_applications');
  const {rows:inquiries,online:inqOnline,push:pushInq,deleteOne:deleteInq,clearAll:clearInqs}=useFirebaseList('inquiries','hce_inquiries');
  const {rows:commLogs,push:pushCommLog,clearAll:clearCommLogs}=useFirebaseList('comm_logs','hce_comm_logs');
  const {rows:trashApps,push:pushTrashApp,deleteOne:permDeleteTrashApp,clearAll:clearTrashApps}=useFirebaseList('trash_applications','hce_trash_apps');
  const {rows:trashInqs,push:pushTrashInq,deleteOne:permDeleteTrashInq,clearAll:clearTrashInqs}=useFirebaseList('trash_inquiries','hce_trash_inqs');
  const online=(appOnline===true&&inqOnline===true)?true:(appOnline===false||inqOnline===false)?false:null;

  const handleCommLog=entry=>{
    const id='LOG-'+Date.now().toString().slice(-9);
    pushCommLog({...entry,id});
  };

  const handleUpdateStatus=(appId,newStatus)=>{
    const db=window._DB;
    if(db){db.ref('applications').child(String(appId)).update({status:newStatus}).catch(e=>console.error(e));}
    setToast(`✅ Status updated to: ${newStatus}`);
  };

  const handleUpdateDocs=(appId,updatedDocs)=>{
    const db=window._DB;
    if(db){db.ref('applications').child(String(appId)).update({uploadedDocs:updatedDocs}).catch(e=>console.error(e));}
  };

  const handleConvertInquiry=(inq)=>{
    const db=window._DB;
    const newId='HCE-ADM-'+Date.now().toString().slice(-8);
    const baseApp={
      id:newId,type:'admission',status:'Submitted',
      convertedFromInquiry:inq.id,
      submittedAt:new Date().toLocaleString('en-IN'),
      name:inq.name||'',fatherName:inq.fatherName||'',motherName:inq.motherName||'',
      phone:inq.phone||'',altPhone:inq.altPhone||'',email:inq.email||'',
      dob:inq.dob||'',gender:inq.gender||'',stream12th:inq.stream12th||'',
      annualIncome:inq.annualIncome||'',
      schoolName:inq.schoolName||'',tenthPct:inq.tenthPct||'',
      twelfthPct:inq.twelfthPct||'',jeemainScore:inq.jeemainScore||'',
      leetScore:inq.leetScore||'',category:inq.category||'General',
      aadharNo:inq.aadharNo||'',familyPpId:inq.familyPpId||'',
      course:inq.course||'B.Tech',branch:inq.branch||'',feeOption:'Yearly',
      branchPref1:inq.branchPref1||'',branchPref2:inq.branchPref2||'',
      branchPref3:inq.branchPref3||'',
      address:inq.address||'',city:inq.city||'',state:inq.state||'',
      pincode:inq.pincode||'',
      deposited:0,paymentSlip:null,uploadedDocs:{},
      photoUrl:inq.photoUrl||'',remarks:inq.remarks||'',
    };
    const fi=calcFee(baseApp);
    baseApp.feeInfo={finalYearly:fi.fy,finalHalf:fi.fh,pending:fi.pend,discount:fi.disc};
    if(db){
      db.ref('applications').child(String(newId)).set(baseApp).catch(e=>console.error(e));
      db.ref('inquiries').child(String(inq.id)).remove().catch(e=>console.error(e));
    }
    pushApp(baseApp);
    deleteInq(inq.id);
    setToast('✅ Converted to Admission — all fields transferred: '+newId);
  };

  const handleEditRecord=(updated, type)=>{
    const db=window._DB;
    const isApp=(type==='application');
    const fbPath=isApp?'applications':'inquiries';
    const id=updated.id;
    if(db){db.ref(fbPath).child(String(id)).set(updated).catch(e=>console.error(e));}
    setToast('✅ Record updated: '+updated.name);
  };

  // Soft-delete wrappers — move to trash before removing
  const handleDeleteApp=(id)=>deleteApp(id,'trash_applications');
  const handleDeleteInq=(id)=>deleteInq(id,'trash_inquiries');
  const handleClearApps=()=>clearApps('trash_applications');
  const handleClearInqs=()=>clearInqs('trash_inquiries');

  // Restore from trash
  const handleRestoreApp=(item)=>{
    const db=window._DB;
    const {deletedAt,originalPath,bulkDeleted,...restored}=item;
    if(db){
      db.ref('applications').child(String(restored.id)).set(restored).catch(e=>console.error(e));
      db.ref('trash_applications').child(String(restored.id)).remove().catch(e=>console.error(e));
    } else {
      pushApp(restored);
    }
    setToast('✅ Restored: '+restored.name);
  };
  const handleRestoreInq=(item)=>{
    const db=window._DB;
    const {deletedAt,originalPath,bulkDeleted,...restored}=item;
    if(db){
      db.ref('inquiries').child(String(restored.id)).set(restored).catch(e=>console.error(e));
      db.ref('trash_inquiries').child(String(restored.id)).remove().catch(e=>console.error(e));
    } else {
      pushInq(restored);
    }
    setToast('✅ Restored inquiry: '+restored.name);
  };
  const handlePermDeleteTrashApp=(id)=>permDeleteTrashApp(id);
  const handlePermDeleteTrashInq=(id)=>permDeleteTrashInq(id);
  const handleClearTrashApps=()=>clearTrashApps();
  const handleClearTrashInqs=()=>clearTrashInqs();


  useEffect(()=>{
    if(online===false){const t=setTimeout(()=>setShowRules(true),6000);return()=>clearTimeout(t);}
    else setShowRules(false);
  },[online]);

  const handleAppSubmit=rec=>{pushApp(rec);setToast(`✅ Application ${rec.id} submitted & synced!`);};
  const handleInqSubmit=rec=>{pushInq(rec);setToast(`✅ Inquiry ${rec.id} submitted & synced!`);};
  const doLogin=()=>{
    if(loginUser===ADMIN_USER&&loginPass===ADMIN_PASS){setAdminMode(true);setShowLogin(false);setView('Admin');setToast('Admin logged in — live data');}
    else alert('Incorrect credentials!');
  };

  const NAV=[
    {id:'Home',icon:'🏠',label:'Home'},
    {id:'Course & Fees',icon:'📚',label:'Course & Fees'},
    {id:'Criteria',icon:'✅',label:'Criteria'},
    {id:'Inquiry',icon:'💬',label:'Inquiry',
      badge:<span style={{marginLeft:'auto',fontSize:9,background:'rgba(245,158,11,.2)',color:'#fbbf24',border:'1px solid rgba(245,158,11,.3)',borderRadius:999,padding:'1px 6px',fontWeight:800}}>NEW</span>},
    {id:'Apply Now',icon:'📋',label:'Apply Now',
      badge:<span style={{marginLeft:'auto',fontSize:9,background:'rgba(16,185,129,.2)',color:'#34d399',border:'1px solid rgba(16,185,129,.3)',borderRadius:999,padding:'1px 6px',fontWeight:800}}>ADMIT</span>},
    {id:'Track Application',icon:'🔍',label:'Track'},
  ];

  // Bottom nav items (most used)
  const BNAV=[
    {id:'Home',icon:'🏠',label:'Home'},
    {id:'Inquiry',icon:'💬',label:'Inquiry'},
    {id:'Apply Now',icon:'📋',label:'Apply'},
    {id:'Track Application',icon:'🔍',label:'Track'},
    {id:'__menu__',icon:'☰',label:'More'},
  ];

  const handleBNav=id=>{
    if(id==='__menu__'){setDrawerOpen(v=>!v);}
    else{setView(id);setDrawerOpen(false);}
  };

  const closeDrawer=()=>setDrawerOpen(false);

  return(
    <div className="app-shell">
      <RulesBanner show={showRules} onClose={()=>setShowRules(false)}/>

      {/* Mobile top header */}
      <div className="mobile-header">
        <div>
          <div className="mobile-header-title">HCE SONIPAT</div>
          <SyncBadge online={online}/>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={()=>setShowLogin(true)} style={{background:'rgba(245,158,11,.15)',border:'1px solid rgba(245,158,11,.3)',color:'#fbbf24',borderRadius:8,padding:'6px 10px',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>🔐 Admin</button>
          <button className="hamburger" onClick={()=>setDrawerOpen(v=>!v)}>☰</button>
        </div>
      </div>

      <div className="body-area">
        {/* Drawer overlay */}
        <div className={`drawer-overlay ${drawerOpen?'open':''}`} onClick={closeDrawer}></div>

        {/* Sidebar / Drawer */}
        <aside className={`sidebar ${drawerOpen?'drawer-open':''}`}>
          <div style={{textAlign:'center',marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:900,letterSpacing:3,color:'#60a5fa',marginBottom:2}}>HCE SONIPAT</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,.35)',letterSpacing:1.5,marginBottom:8}}>DIGITAL ADMISSION DESK 2026-27</div>
            <SyncBadge online={online}/>
          </div>
          <nav style={{display:'flex',flexDirection:'column',gap:2,flex:1}}>
            {NAV.map(({id,icon,label,badge})=>(
              <button key={id} onClick={()=>{setView(id);closeDrawer();}} className={`nav-btn ${view===id?'active':''}`}>
                <span>{icon}</span>{label}{badge}
              </button>
            ))}
            <hr className="divider"/>
            <button onClick={()=>{setShowLogin(true);closeDrawer();}} className="nav-btn" style={{color:'#fbbf24'}}>
              🔐 Admin Panel
              <span style={{marginLeft:'auto',background:'rgba(37,99,235,.2)',color:'#60a5fa',fontSize:11,borderRadius:999,padding:'1px 6px',border:'1px solid rgba(96,165,250,.28)'}}>
                {applications.length+inquiries.length}
              </span>
            </button>
          </nav>
          <div className="glass-sm" style={{marginTop:12,padding:'11px',borderRadius:12}}>
            <div style={{fontSize:10,fontWeight:800,color:'#60a5fa',marginBottom:4,letterSpacing:.6}}>LEADERSHIP</div>
            <div style={{fontSize:10.5,lineHeight:1.85,color:'rgba(255,255,255,.65)'}}>
              <div><strong>Director:</strong> Dr. Devendra Kumar</div>
<div><strong>IQAC:</strong> Dr. Neeraj Gupta</div>
              <div><strong>Dean:</strong> Mrs. Ritu Goyal</div>
              
            </div>
            <hr className="divider"/>
            <div style={{fontSize:10,fontWeight:800,color:'#60a5fa',marginBottom:3,letterSpacing:.6}}>HODs</div>
            <div style={{fontSize:10,lineHeight:1.85,color:'rgba(255,255,255,.5)'}}>
              CSE: Dr. Ashu Bansal<br/> ECE: Mr. Rakesh Verma<br/>
              ME: Mr. Arun Kumar <br/> Civil: Mr. Chirag Rohilla<br/>
              EE: Dr. Puneet Pahuja<br/>BCA: Mr. Neeraj Saini
            </div>
          </div>
        </aside>

        {/* Main content */}
        <main className="main-scroll">
          {view==='Home'              &&<HomeSection    setView={setView} setProgLevel={setProgLevel} online={online} applications={applications} inquiries={inquiries}/>}
          {view==='Course & Fees'     &&<CoursesSection setView={setView} progLevel={progLevel} setProgLevel={setProgLevel}/>}
          {view==='Criteria'          &&<CriteriaSection/>}
          {view==='Inquiry'           &&<InquirySection onSubmit={handleInqSubmit}/>}
          {view==='Apply Now'         &&<ApplySection   onSubmit={handleAppSubmit}/>}
          {view==='Track Application' &&<TrackSection   applications={applications} inquiries={inquiries}/>}
          {view==='Admin'&&adminMode  &&<AdminSection   applications={applications} inquiries={inquiries} online={online} onLogout={()=>{setAdminMode(false);setView('Home');}} onDeleteApp={handleDeleteApp} onDeleteInq={handleDeleteInq} onClearApps={handleClearApps} onClearInqs={handleClearInqs} commLogs={commLogs} onLog={handleCommLog} onClearLogs={clearCommLogs} onUpdateStatus={handleUpdateStatus} onUpdateDocs={handleUpdateDocs} onConvertInquiry={handleConvertInquiry} onEditRecord={handleEditRecord} trashApps={trashApps} trashInqs={trashInqs} onRestoreApp={handleRestoreApp} onRestoreInq={handleRestoreInq} onPermDeleteTrashApp={handlePermDeleteTrashApp} onPermDeleteTrashInq={handlePermDeleteTrashInq} onClearTrashApps={handleClearTrashApps} onClearTrashInqs={handleClearTrashInqs}/>}
        </main>
      </div>

      {/* Bottom Nav (mobile only) */}
      <nav className="bottom-nav">
        {BNAV.map(({id,icon,label})=>(
          <button key={id} className={`bnav-btn ${view===id&&id!=='__menu__'?'active':id==='__menu__'&&drawerOpen?'active':''}`}
            onClick={()=>handleBNav(id)}>
            <span className="ico">{icon}</span>
            <span>{label}</span>
          </button>
        ))}
      </nav>

      {/* Admin Login Modal */}
      {showLogin&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.88)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:400,padding:16}}>
          <div className="glass modal-box" style={{padding:28,width:360,maxWidth:'100%',borderRadius:18}}>
            <h3 style={{fontSize:18,fontWeight:800,marginBottom:4}}>🔐 Admin Login</h3>
            <p style={{color:'rgba(255,255,255,.35)',fontSize:12,marginBottom:16}}>Access live data from all devices</p>
            <div className="field" style={{marginBottom:9}}>
              <label>Username</label>
              <input className="inp" type="text" value={loginUser} onChange={e=>setLoginUser(e.target.value)} autoComplete="off"/>
            </div>
            <div className="field" style={{marginBottom:14}}>
              <label>Password</label>
              <input className="inp" type="password" value={loginPass} onChange={e=>setLoginPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
            </div>
            <button className="btn-blue" onClick={doLogin} style={{marginBottom:8,padding:'13px',fontSize:15}}>Login</button>
            <button className="btn-ghost" onClick={()=>setShowLogin(false)} style={{width:'100%',fontSize:13,padding:'11px'}}>Cancel</button>
          </div>
        </div>
      )}

      {toast&&<Toast msg={toast} done={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
